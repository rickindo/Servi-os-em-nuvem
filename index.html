<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CEP - ViaCEP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        #resultado {
            margin-top: 20px;
        }

        .resultado-item {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
            border-radius: 3px;
        }

        .resultado-item p {
            margin: 8px 0;
            color: #333;
        }

        .resultado-item strong {
            color: #667eea;
        }

        .erro {
            color: #d32f2f;
            text-align: center;
            padding: 15px;
            background: #ffebee;
            border-radius: 5px;
            margin-top: 20px;
        }

        .sucesso {
            color: #388e3c;
            text-align: center;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Consulta CEP</h1>
        <div class="input-group">
            <input type="text" id="cep" placeholder="Digite o CEP (8 dígitos)" maxlength="8">
            <button onclick="buscarCEP()">Buscar</button>
        </div>
        <div id="resultado"></div>
    </div>

    <script>
        function buscarCEP() {
            const cep = document.getElementById('cep').value.trim();
            const resultadoDiv = document.getElementById('resultado');

            // Validar CEP
            if (!cep || cep.length !== 8 || isNaN(cep)) {
                resultadoDiv.innerHTML = '<div class="erro">⚠️ Digite um CEP válido com 8 dígitos.</div>';
                return;
            }

            // Construir a URL da API ViaCEP
            const url = `https://viacep.com.br/ws/${cep}/json/`;

            // Fazer a requisição usando fetch
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Erro na requisição: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.erro) {
                        resultadoDiv.innerHTML = '<div class="erro">❌ CEP não encontrado.</div>';
                    } else {
                        resultadoDiv.innerHTML = `
                            <div class="sucesso">✅ CEP encontrado com sucesso!</div>
                            <div class="resultado-item">
                                <p><strong>CEP:</strong> ${data.cep}</p>
                                <p><strong>Logradouro:</strong> ${data.logradouro || 'N/A'}</p>
                                <p><strong>Bairro:</strong> ${data.bairro || 'N/A'}</p>
                                <p><strong>Cidade:</strong> ${data.localidade}</p>
                                <p><strong>Estado:</strong> ${data.uf}</p>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    resultadoDiv.innerHTML = `<div class="erro">❌ Erro ao buscar CEP: ${error.message}</div>`;
                });
        }

        // Permitir buscar ao pressionar Enter
        document.getElementById('cep').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                buscarCEP();
            }
        });
    </script>
</body>
</html>
